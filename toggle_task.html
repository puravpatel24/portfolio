<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Toggle Assignment</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="event_handler.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; line-height: 1.6; }
        #content-box { border: 1px solid #ccc; padding: 15px; width: 300px; border-radius: 5px; }
        button { cursor: pointer; padding: 8px 15px; }
        .info-text { margin-top: 10px; color: #333; }
    </style>
</head>
<body>

    <h2>Assignment: jQuery Click Event</h2>
    
    <div id="content-box">
        <button id="toggle-btn">Show/Hide Content</button>
        <p class="info-text">
            This is a sample paragraph that will be toggled using jQuery functions. 
            It demonstrates the use of .click() and .toggle() methods.
        </p>
    </div>

</body>
</html>
