<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JavaScript InnerHTML Example</title>
</head>
<body>

    <h2>Paragraph & Button Demo</h2>

    <!-- Paragraph -->
    <p id="myPara">Click the button to change this text.</p>

    <!-- Button -->
    <button onclick="changeText()">Click Me</button>

    <!-- Linking JavaScript file -->
    <script src="script.js"></script>

</body>
</html>
