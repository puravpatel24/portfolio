<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Layers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* ⭐ Mukhya: Container ne position: relative joiye */
        .image-container {
            position: relative;  /* ⭐ Aa jaruri chhe! */
            width: 600px;
            height: 400px;
            overflow: hidden;    /* Image bahar na jay */
            border-radius: 8px;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* z-index: 1; */  /* ⭐ Haal ma hatavi do - jaruri nathi */
            display: block;
        }

        .caption {
            position: absolute;  /* ⭐ Parent (container) par relative */
            bottom: 0;
            left: 0;
            right: 0;
            /* z-index: 2; */  /* ⭐ Haal ma hatavi do - jaruri nahi */
            
            /* Semi-transparent black background */
            background: rgba(0, 0, 0, 0.6);  /* 60% black */
            /* Ke */
            /* background: linear-gradient(transparent, rgba(0,0,0,0.8)); */
            
            color: white;
            padding: 20px;
            font-size: 16px;
            line-height: 1.5;
        }

        .caption h3 {
            margin-bottom: 8px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Task Title: Z-Index Layers</h1>
    
    <div class="image-container">
        <!-- Image -->
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800" 
             alt="Beach scene">
        
        <!-- Caption - image par overlay thase -->
        <div class="caption">
            <h3>Beautiful Ocean View</h3>
            <p>Aa caption image par overlay thayo chhe! 🎉</p>
        </div>
    </div>

    <p style="margin-top: 20px;">
        <strong>Key learning:</strong> Caption ne image par laava mate, 
        bane same parent container ma hova joiye, ane parent ne 
        <code>position: relative</code> hova joiye.
    </p>

</body>
</html>
